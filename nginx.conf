# ═══════════════════════════════════════════════════════════════
#  FermesDirect — Nginx Production Config
#  High-traffic SPA: 1M concurrent · TLS 1.3 · SPA fallback
# ═══════════════════════════════════════════════════════════════

worker_processes      auto;
worker_rlimit_nofile  1000000;

events {
  worker_connections  65535;
  use                 epoll;
  multi_accept        on;
}

http {
  include            mime.types;
  default_type       application/octet-stream;

  # ── Performance ──────────────────────────────────────────────
  sendfile           on;
  tcp_nopush         on;
  tcp_nodelay        on;
  keepalive_timeout  65;
  keepalive_requests 10000;

  # ── Gzip ─────────────────────────────────────────────────────
  gzip              on;
  gzip_vary         on;
  gzip_comp_level   6;
  gzip_min_length   256;
  gzip_proxied      any;
  gzip_types        text/plain text/css application/json application/javascript
                    text/xml text/javascript image/svg+xml application/x-font-ttf
                    font/opentype;

  # ── Security ─────────────────────────────────────────────────
  server_tokens      off;
  add_header X-Frame-Options          SAMEORIGIN always;
  add_header X-Content-Type-Options   nosniff    always;
  add_header X-XSS-Protection         "1; mode=block" always;
  add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

  # ── Rate limiting zones ───────────────────────────────────────
  limit_req_zone  $binary_remote_addr zone=api:10m  rate=30r/m;
  limit_req_zone  $binary_remote_addr zone=web:10m  rate=200r/m;
  limit_conn_zone $binary_remote_addr zone=conn:10m;

  # ── Node.js upstream cluster ──────────────────────────────────
  upstream fd_app {
    least_conn;
    server 127.0.0.1:3000 weight=1 max_fails=3 fail_timeout=30s;
    keepalive 256;
  }

  # ── HTTP → HTTPS redirect ────────────────────────────────────
  server {
    listen      80;
    server_name fermesdirect.com www.fermesdirect.com;
    return 301  https://$host$request_uri;
  }

  # ── Main HTTPS server ─────────────────────────────────────────
  server {
    listen      443 ssl http2;
    server_name fermesdirect.com www.fermesdirect.com;
    root        /var/www/fermesdirect/public;

    ssl_certificate     /etc/letsencrypt/live/fermesdirect.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fermesdirect.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:50m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling        on;
    ssl_stapling_verify on;

    limit_conn conn 100;

    # Block scanners and sensitive paths
    location ~* (\.php|\.env|\.git|wp-|xmlrpc|phpmyadmin) {
      deny all; return 444;
    }
    location ~ /\. { deny all; }

    # Health check — direct to Node, no logging
    location = /health {
      proxy_pass         http://fd_app;
      access_log         off;
    }

    # API routes → Node.js with rate limiting
    location /api/ {
      limit_req          zone=api burst=20 nodelay;
      proxy_pass         http://fd_app;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_set_header   Connection        "";
      proxy_read_timeout 30s;
    }

    # Static assets — serve directly from disk, long cache, NO 404 fallback
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|avif)$ {
      expires            7d;
      add_header         Cache-Control "public, immutable";
      access_log         off;
      try_files          $uri =404;
    }

    # SPA catch-all — try file on disk first, then pass to Node.js
    # This is the KEY fix: unknown paths serve index.html via Node, not nginx 404
    location / {
      limit_req          zone=web burst=50 nodelay;
      try_files          $uri $uri/ @nodejs;
    }

    # Named location — everything not found as a static file goes to Node.js
    location @nodejs {
      proxy_pass         http://fd_app;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_set_header   Connection        "";
      proxy_read_timeout 30s;
    }
  }
}
